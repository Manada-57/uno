<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>UNO Multiplayer - Secure</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23E8372A'/><text y='.9em' font-size='72' x='14'>🃏</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0A14;--surface:#12121F;--surface2:#1A1A2E;--surface3:#22223A;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);
  --text:#F0F0F8;--muted:rgba(240,240,248,.5);--dim:rgba(240,240,248,.22);
  --gold:#F7C520;--goldd:#C49B10;--red:#E8372A;
  --r:14px;--rsm:8px;--rlg:20px;--rxl:28px;
  --cw:58px;--ch:86px;--cr:9px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;overflow-x:hidden;}
canvas#bg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.3;}
.screen{display:none;position:relative;z-index:10;width:100%;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}

/* SPLASH */
#splash{align-items:center;justify-content:center;}
.splash-inner{display:flex;flex-direction:column;align-items:center;gap:22px;padding:40px 20px;max-width:360px;width:100%;}
.logo{font-family:'Bebas Neue',cursive;font-size:110px;line-height:.9;letter-spacing:8px;text-shadow:0 0 60px rgba(247,197,32,.4),6px 6px 0 var(--red),-3px -3px 0 #B8971A;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.logo-sub{font-size:13px;font-weight:700;letter-spacing:6px;color:var(--muted);text-transform:uppercase;}
.splash-cards{display:flex;gap:6px;justify-content:center;}
.sc{width:44px;height:66px;border-radius:7px;border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:18px;color:#fff;box-shadow:2px 3px 8px rgba(0,0,0,.5);}
.sc:nth-child(1){background:linear-gradient(150deg,#E8372A,#A0221A);transform:rotate(-15deg);}
.sc:nth-child(2){background:linear-gradient(150deg,#1E7FD8,#0D4A8A);transform:rotate(-7deg);}
.sc:nth-child(3){background:linear-gradient(150deg,#26B152,#156B2E);}
.sc:nth-child(4){background:linear-gradient(150deg,#F7C520,#C49B10);transform:rotate(7deg);color:#2A1E00;}
.sc:nth-child(5){background:conic-gradient(#E8372A 0 25%,#1E7FD8 25% 50%,#26B152 50% 75%,#F7C520 75%);transform:rotate(15deg);}
.inp-wrap{width:100%;position:relative;}
.inp-wrap input{width:100%;padding:14px 18px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:'Outfit',sans-serif;font-size:16px;font-weight:600;outline:none;transition:border-color .2s;}
.inp-wrap input:focus{border-color:var(--gold);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:var(--r);border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:14px;font-weight:800;letter-spacing:.5px;transition:transform .12s, opacity .2s;text-transform:uppercase;}
.btn:hover:not(:disabled){transform:translateY(-2px);}
.btn:active:not(:disabled){transform:translateY(0);}
.btn:disabled{opacity:0.5; cursor:not-allowed; transform:none;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--goldd));color:#1A1000;box-shadow:0 4px 0 #8A6800,0 6px 20px rgba(247,197,32,.3);font-size:16px;padding:14px 36px;width:100%;}
.btn-ghost{background:var(--surface2);color:var(--text);border:1.5px solid var(--border2);}
.btn-sm{padding:8px 14px;font-size:12px;}
.btn-icon{padding:10px;border-radius:10px;background:var(--surface3);color:var(--text);border:1px solid var(--border);font-size:18px;}
.btn-danger{background:rgba(232,55,42,.12);color:#F08078;border:1.5px solid rgba(232,55,42,.28);}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:rgba(10,10,20,.85);border-bottom:1px solid var(--border);backdrop-filter:blur(10px);position:sticky;top:0;z-index:50;}
.nav-logo{font-family:'Bebas Neue',cursive;font-size:30px;letter-spacing:4px;text-shadow:0 0 20px rgba(247,197,32,.4),3px 3px 0 var(--red);}
.nav-user{display:flex;align-items:center;gap:10px;}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;border:2px solid rgba(255,255,255,.2);flex-shrink:0;}

/* LOBBY */
#lobby{align-items:center;}
.lobby-wrap{width:100%;max-width:900px;padding:20px 16px 40px;display:flex;flex-direction:column;gap:20px;}
.sec-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.qcard{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rlg);padding:20px;cursor:pointer;transition:border-color .2s,transform .15s;}
.qcard:hover{border-color:var(--border2);transform:translateY(-3px);}
.qcard-icon{font-size:30px;margin-bottom:8px;}
.qcard-title{font-size:16px;font-weight:800;}
.room-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .2s;margin-bottom:8px;}
.room-card:hover{border-color:var(--border2);}
.rdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.rdot.waiting{background:#26B152;box-shadow:0 0 8px #26B152;}
.rinfo{flex:1;}
.rname{font-size:14px;font-weight:700;}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-state .ei{font-size:44px;margin-bottom:12px;}

/* CREATE */
#create{align-items:center;}
.form-wrap{width:100%;max-width:520px;padding:20px 16px 40px;}
.form-box{background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--rxl);padding:30px 26px;box-shadow:0 8px 32px rgba(0,0,0,.6);}
.form-title{font-family:'Bebas Neue',cursive;font-size:34px;letter-spacing:3px;margin-bottom:4px;}
.form-group{margin-bottom:18px;}
.form-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:8px;}
.form-input{width:100%;padding:12px 14px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;outline:none;transition:border-color .2s;cursor:pointer;}
.ps-row{display:flex;gap:8px;flex-wrap:wrap;}
.ps-opt{flex:1;min-width:60px;padding:12px 8px;background:var(--surface2);border:2px solid var(--border2);border-radius:var(--r);cursor:pointer;text-align:center;transition:all .15s;}
.ps-opt.sel{border-color:var(--gold);background:rgba(247,197,32,.1);}
.ps-num{font-family:'Bebas Neue',cursive;font-size:26px;color:var(--gold);}
.ps-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;}
.rule-row{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);padding:10px 12px;margin-bottom:8px;}
.toggle{width:42px;height:22px;border-radius:11px;background:var(--surface3);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.toggle.on{background:#26B152;}
.toggle::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s;}
.toggle.on::after{transform:translateX(20px);}
.always-on{font-size:11px;font-weight:800;color:#26B152;padding:3px 10px;background:rgba(38,177,82,.12);border-radius:6px;white-space:nowrap;}

/* ROOM */
#room{align-items:center;}
.room-wrap{width:100%;max-width:700px;padding:20px 16px 40px;}
.room-header{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rxl);padding:22px 26px;margin-bottom:14px;}
.rh-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;flex-wrap:wrap;}
.rh-name{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:2px;}
.code-box{background:var(--surface3);border:1.5px solid var(--border2);border-radius:10px;padding:6px 14px;display:flex;align-items:center;gap:8px;}
.code-val{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:4px;color:var(--gold);}
.rh-badges{display:flex;gap:10px;flex-wrap:wrap;}
.rh-badge{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;color:var(--muted);}
.slots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:14px;}
.slot{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;align-items:center;gap:6px;}
.slot.filled{border-color:var(--border2);}
.slot.empty-slot{border-style:dashed;opacity:.5;}
.slot.host-slot{border-color:rgba(247,197,32,.4);}
.slot-av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;border:2px solid rgba(255,255,255,.15);}
.slot-name{font-size:13px;font-weight:700;text-align:center;}
.slot-tag{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;}
.slot-tag.host{color:var(--gold);}
.invite-box{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:18px 22px;margin-bottom:14px;}
.share-row{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);padding:10px 14px;margin-top:10px;}
.share-link{flex:1;font-size:11px;font-family:monospace;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.room-controls{display:flex;gap:10px;flex-wrap:wrap;}

/* GAME */
#game{background:var(--bg);}
.game-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(10,10,20,.85);border-bottom:1px solid var(--border);backdrop-filter:blur(10px);position:sticky;top:0;z-index:40;}
.game-logo{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:4px;text-shadow:0 0 16px rgba(247,197,32,.4),2px 2px 0 var(--red);}
.scores-row{display:flex;gap:6px;flex-wrap:wrap;}
.sp{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:3px 9px;font-size:11px;font-weight:700;}
.sp.active{border-color:rgba(247,197,32,.5);background:rgba(247,197,32,.08);}
#gstatus{background:rgba(0,0,0,.45);border-bottom:1px solid var(--border);padding:7px 20px;text-align:center;font-size:13px;font-weight:700;color:rgba(255,255,255,.9);min-height:32px;}
#board{padding:8px 12px;display:flex;flex-direction:column;gap:8px;}
.opp-zone{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:13px;padding:9px 12px;display:flex;align-items:center;gap:10px;transition:border-color .25s;}
.opp-zone.active-turn{border-color:rgba(247,197,32,.4);background:rgba(247,197,32,.04);}
.opp-meta{display:flex;flex-direction:column;gap:2px;min-width:64px;}
.opp-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;border:2px solid rgba(255,255,255,.15);margin-bottom:3px;}
.opp-nm{font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);}
.opp-cnt{font-size:18px;font-weight:900;line-height:1;}
.opp-cards{display:flex;gap:3px;flex-wrap:wrap;flex:1;}
.center-zone{display:flex;align-items:center;justify-content:center;gap:24px;background:radial-gradient(ellipse 90% 80% at center,rgba(20,80,45,.7) 0%,rgba(10,40,25,.95) 100%);border:2px solid rgba(255,255,255,.05);border-radius:20px;padding:18px 28px;position:relative;}
.pile{display:flex;flex-direction:column;align-items:center;gap:5px;}
.pile-lbl{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3);}
.draw-pile{width:var(--cw);height:var(--ch);border-radius:var(--cr);background:linear-gradient(145deg,#B83228,#6E1C15);border:3px solid rgba(255,255,255,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:2px;color:rgba(255,255,255,.25);box-shadow:3px 4px 0 rgba(0,0,0,.55);transition:transform .15s;position:relative;}
.draw-pile:hover:not(.no-draw){transform:translateY(-4px) rotate(-2deg);}
.draw-pile.no-draw{cursor:not-allowed;opacity:.5;}
.discard-top{width:var(--cw);height:var(--ch);border-radius:var(--cr);border:3px solid rgba(255,255,255,.55);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:3px 4px 0 rgba(0,0,0,.55);position:relative;}
.dc-corner{position:absolute;font-family:'Bebas Neue',cursive;font-size:10px;}
.dc-corner.tl{top:4px;left:5px;}
.dc-corner.br{bottom:4px;right:5px;transform:rotate(180deg);}
.center-mid{display:flex;flex-direction:column;align-items:center;gap:8px;}
#dir-icon{font-size:28px;}
#color-dot{width:26px;height:26px;border-radius:50%;border:3px solid rgba(255,255,255,.45);transition:background .3s;}
.player-zone{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:10px 12px;}
.pz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
#p-hand{display:flex;gap:5px;flex-wrap:wrap;min-height:88px;align-items:center;}

/* CARDS */
.card{width:var(--cw);height:var(--ch);border-radius:var(--cr);border:2.5px solid rgba(255,255,255,.4);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;box-shadow:2px 3px 0 rgba(0,0,0,.5);transition:transform .18s cubic-bezier(.34,1.56,.64,1);position:relative;user-select:none;flex-shrink:0;overflow:hidden;}
.card:hover:not(.no-play){transform:translateY(-14px) scale(1.06);box-shadow:2px 18px 14px rgba(0,0,0,.55);z-index:20;}
.card.no-play{opacity:.3;cursor:not-allowed;}
.cv{font-family:'Bebas Neue',cursive;font-size:25px;color:#fff;line-height:1;text-shadow:1px 1px 0 rgba(0,0,0,.4);}
.cc{position:absolute;font-family:'Bebas Neue',cursive;font-size:10px;color:rgba(255,255,255,.8);line-height:1;}
.cc.tl{top:4px;left:5px;}
.cc.br{bottom:4px;right:5px;transform:rotate(180deg);}
.c-red{background:linear-gradient(150deg,#E8372A,#9E1F14);}
.c-blue{background:linear-gradient(150deg,#1E7FD8,#0D4280);}
.c-green{background:linear-gradient(150deg,#26B152,#145C2C);}
.c-yellow{background:linear-gradient(150deg,#F7C520,#BF980E);}
.c-yellow .cv,.c-yellow .cc{color:rgba(40,28,0,.9)!important;text-shadow:none!important;}
.c-wild{background:conic-gradient(#E8372A 0 25%,#1E7FD8 25% 50%,#26B152 50% 75%,#F7C520 75%);border-color:rgba(255,255,255,.6);}
.card-back{width:var(--cw);height:var(--ch);border-radius:var(--cr);background:linear-gradient(145deg,#B83228,#6E1C15);border:2.5px solid rgba(255,255,255,.2);box-shadow:2px 3px 0 rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.18);flex-shrink:0;}

/* GAME CONTROLS */
.game-controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:6px 16px 16px;}
.btn-uno{background:linear-gradient(135deg,#F7C520,#C49B10);color:#1A1000;font-size:16px;padding:10px 30px;letter-spacing:3px;box-shadow:0 4px 0 #8A6800;}
.btn-uno.faded{opacity:.3;}
.btn-end{background:rgba(38,177,82,.12);color:#7EE8A2;border:1.5px solid rgba(38,177,82,.3);display:none;}
.btn-end.show{display:inline-flex;}

/* MODALS */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:200;}
.modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--rxl);padding:26px 30px;z-index:201;box-shadow:0 20px 60px rgba(0,0,0,.8);text-align:center;min-width:280px;}
.color-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cc-btn{padding:14px 10px;border-radius:10px;border:none;cursor:pointer;font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;color:rgba(255,255,255,.95);transition:transform .12s;box-shadow:0 4px 0 rgba(0,0,0,.4);}
.join-inp{width:100%;padding:14px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:6px;text-align:center;outline:none;margin-bottom:14px;}

/* TOASTS & WIN */
#uno-shout{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Bebas Neue',cursive;font-size:90px;letter-spacing:10px;color:#fff;text-shadow:0 0 40px rgba(247,197,32,.9),5px 5px 0 var(--red);z-index:300;pointer-events:none;animation:shout 1.8s forwards;}
@keyframes shout{0%{opacity:0;transform:translate(-50%,-50%) scale(.3) rotate(-8deg)}18%{opacity:1;transform:translate(-50%,-50%) scale(1.1) rotate(2deg)}50%,85%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0}}
#toast{display:none;position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:9px 20px;font-size:13px;font-weight:700;z-index:400;white-space:nowrap;}
#win-screen{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);backdrop-filter:blur(10px);z-index:500;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:20px;}
#win-screen.show{display:flex;}
.win-emoji{font-size:72px;animation:bounce .5s ease;}
@keyframes bounce{0%,100%{transform:scale(1)}40%{transform:scale(1.3)}70%{transform:scale(.9)}}
.win-title{font-family:'Bebas Neue',cursive;font-size:54px;letter-spacing:5px;text-shadow:0 0 30px rgba(247,197,32,.6);color:var(--gold);}
.win-btns{display:flex;gap:12px;margin-top:14px;flex-wrap:wrap;justify-content:center;}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="screen active" id="splash">
  <div class="splash-inner">
    <div><div class="logo">UNO</div><div class="logo-sub">Secure Multiplayer</div></div>
    <div class="splash-cards"><div class="sc">7</div><div class="sc">⊘</div><div class="sc">+2</div><div class="sc">⇄</div><div class="sc">★</div></div>
    <div class="inp-wrap">
      <input type="text" id="name-inp" placeholder="Enter your name..." maxlength="16" autocomplete="off">
      <span class="inp-badge">✏️</span>
    </div>
    <button class="btn btn-gold" onclick="goToLobby()">Play Now 🎮</button>
  </div>
</div>

<div class="screen" id="lobby">
  <div class="nav">
    <div class="nav-logo">UNO</div>
    <div class="nav-user"><div class="avatar" id="nav-av"></div><span style="font-size:13px;font-weight:700;" id="nav-name"></span></div>
  </div>
  <div class="lobby-wrap">
    <div>
      <div class="sec-title">Quick Actions</div>
      <div class="quick-grid">
        <div class="qcard" onclick="goTo('create')"><div class="qcard-icon">🏠</div><div class="qcard-title">Create Room</div></div>
        <div class="qcard" onclick="showJoinModal()"><div class="qcard-icon">🔗</div><div class="qcard-title">Join by Code</div></div>
      </div>
    </div>
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div class="sec-title" style="margin:0;">Open Rooms</div>
        <button class="btn btn-sm btn-ghost" onclick="loadRooms()" style="width:auto;font-size:11px;">↻ Refresh</button>
      </div>
      <div style="margin-top:10px;" id="room-list"></div>
    </div>
  </div>
</div>

<div class="screen" id="create">
  <div class="nav"><button class="btn btn-icon" onclick="goTo('lobby')">←</button><div class="nav-logo">UNO</div><div style="width:44px;"></div></div>
  <div style="display:flex;justify-content:center;">
  <div class="form-wrap"><div class="form-box">
    <div class="form-title">Create Room</div>

</div>

<script>
// ════════════════════════ CONFIG ════════════════════════
const CONFIG = {
  databaseURL: "https://uno-multiplayer-07-default-rtdb.asia-southeast1.firebasedatabase.app"
};
const db = {
  makeUrl: (path) => `${CONFIG.databaseURL}${path}.json`,
  get: async (path) => {
    try {
      const res = await fetch(db.makeUrl(path));
      if (!res.ok) return null;
      return await res.json();
    } catch (e) { return null; }
  },
  set: async (path, data) => {
    try { await fetch(db.makeUrl(path), { method: 'PUT', body: JSON.stringify(data) }); } catch (e) {}
  },
  remove: async (path) => {
    try { await fetch(db.makeUrl(path), { method: 'DELETE' }); } catch (e) {}
  }
};

// ════════════════════════ BACKGROUND ════════════════════════
(function(){
  const c=document.getElementById('bg'),x=c.getContext('2d');
  const P=[], cols=['#E8372A','#1E7FD8','#26B152','#F7C520'];
  function r(){c.width=innerWidth;c.height=innerHeight;}
  r();addEventListener('resize',r);
  for(let i=0;i<24;i++)P.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*2.5+1,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,col:cols[i%4],a:Math.random()*.4+.1});
  function draw(){x.clearRect(0,0,c.width,c.height);P.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=c.width;if(p.x>c.width)p.x=0;if(p.y<0)p.y=c.height;if(p.y>c.height)p.y=0;x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.fillStyle=p.col;x.globalAlpha=p.a;x.fill();});x.globalAlpha=1;requestAnimationFrame(draw);}
  draw();
})();

// ════════════════════════ HELPERS ════════════════════════
const COLORS=['red','blue','green','yellow'];
const ACTS=['skip','reverse','draw2'];
const LBL={skip:'⊘',reverse:'⇄',draw2:'+2',wild:'★',wild4:'+4'};
const CGRAD={red:'linear-gradient(150deg,#E8372A,#9E1F14)',blue:'linear-gradient(150deg,#1E7FD8,#0D4280)',green:'linear-gradient(150deg,#26B152,#145C2C)',yellow:'linear-gradient(150deg,#F7C520,#BF980E)'};
const CHEX={red:'#E8372A',blue:'#1E7FD8',green:'#26B152',yellow:'#F7C520'};
const AVCOLS=['#E8372A','#1E7FD8','#26B152','#F7C520','#9B59B6','#E67E22','#1ABC9C','#E91E8C'];
const BOTS=['Bot Alpha','Bot Beta','Bot Gamma','Bot Delta','Bot Epsilon'];

let ME={name:'',color:'',initial:''};
let MY_IDX=0;
let ROOM=null;
let GAME=null;
let myPlayerId = null;
let pollInterval = null;

function ssGet(k){try{const v=sessionStorage.getItem('uno_'+k);return v?JSON.parse(v):null;}catch(e){return null;}}
function ssSet(k,v){try{sessionStorage.setItem('uno_'+k,JSON.stringify(v));}catch(e){}}
function goTo(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function toArr(v){ if(!v) return []; if(Array.isArray(v)) return v.filter(x=>x!=null); return Object.keys(v).map(k=>v[k]).filter(x=>x!=null); }
function cardLbl(c){return LBL[c.v]||c.v;}
function cardCls(c){if(c.c==='wild')return 'c-wild';return 'c-'+c.c;}
function cardPts(c){if(c.c==='wild')return 50;if(ACTS.includes(c.v))return 20;return parseInt(c.v)||0;}
let toastTmr;
function showToast(m){const el=document.getElementById('toast');el.textContent=m;el.style.display='block';clearTimeout(toastTmr);toastTmr=setTimeout(()=>el.style.display='none',2500);}
function showShout(t){const el=document.getElementById('uno-shout');el.textContent=t;el.style.display='block';el.style.animation='none';requestAnimationFrame(()=>{el.style.animation='shout 1.8s forwards';});setTimeout(()=>el.style.display='none',1800);}
function setGStatus(m){document.getElementById('gstatus').textContent=m;}

// ════════════════════════ SPLASH ════════════════════════
function goToLobby(){
  const n=(document.getElementById('name-inp').value||'').trim();
  if(!n){showToast('Enter your name!');return;}
  ME.name=n; ME.color=AVCOLS[Math.floor(Math.random()*AVCOLS.length)]; ME.initial=n.charAt(0).toUpperCase();
  ssSet('name',ME.name); ssSet('color',ME.color); ssSet('initial',ME.initial);
  document.getElementById('nav-av').style.background=ME.color; document.getElementById('nav-av').textContent=ME.initial;
  document.getElementById('nav-name').textContent=ME.name;
  loadRooms(); goTo('lobby');
}

// ════════════════════════ LOBBY ════════════════════════
async function loadRooms(){
  const el=document.getElementById('room-list');
  el.innerHTML='<div class="empty-state"><div class="ei">⏳</div><div>Loading...</div></div>';
  const data = await db.get('/rooms');
  renderRoomList(data ? Object.values(data) : []);
}

function renderRoomList(rooms){
  const el=document.getElementById('room-list');
  rooms.forEach(r=>{r.players=toArr(r.players);});
  const open=rooms.filter(r=>r.status==='waiting'&&r.players.length<r.maxPlayers);
  if(!rooms.length){el.innerHTML='<div class="empty-state"><div class="ei">🃏</div><div>No rooms yet</div></div>';return;}
  let html='';
  open.forEach(r=>{html+=`<div class="room-card" onclick="joinRoomById('${r.id}')"><div class="rdot waiting"></div><div class="rinfo"><div class="rname">${r.name}</div></div><button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();joinRoomById('${r.id}')">Join</button></div>`;});
  el.innerHTML=html;
}

function showJoinModal(){document.getElementById('overlay').style.display='block';document.getElementById('join-modal').style.display='block';document.getElementById('join-inp').value='';document.getElementById('join-inp').focus();}
function closeModals(){document.getElementById('overlay').style.display='none';document.querySelectorAll('.modal').forEach(m=>m.style.display='none';}

async function joinByCode(){
  const code=(document.getElementById('join-inp').value||'').trim().toUpperCase();
  if(!code){showToast('Enter code!');return;}
  const data = await db.get('/rooms');
  const r = data ? Object.values(data).find(x => x.code === code) : null;
  if(!r){showToast('Not found');return;}
  closeModals(); await joinRoomById(r.id);
}

// ════════════════════════ CREATE ROOM ════════════════════════
let selMaxVal=4;
function selMax(n){ selMaxVal=n; document.querySelectorAll('.ps-opt').forEach(el=>el.classList.toggle('sel',parseInt(el.querySelector('.ps-num').textContent)===n)); }
function genCode(){return 'UNO-'+(Math.random()*1000|0).toString(36).toUpperCase().padStart(3,'X');}

async function createRoom(){
  if(!ME.name){goTo('splash');return;}
  const name=(document.getElementById('room-name-inp').value||'').trim()||ME.name+"'s Room";
  const cpuFill=document.getElementById('cpu-fill').value;
  const noMercy=document.getElementById('rule-nomercy').classList.contains('on');
  const rid='room-'+Date.now();
  const myId='p-host-'+Date.now();

  const hostPlayer={id:myId,name:ME.name,color:ME.color,initial:ME.initial,isHost:true,isBot:false,score:0};
  const roomData={id:rid,name,code:genCode(),maxPlayers:selMaxVal,cpuFill,rules:{noMercy},host:ME.name,status:'waiting',players:{[myId]:hostPlayer},createdAt:Date.now()};

  await db.set('/rooms/'+rid, roomData);
  
  MY_IDX=0; myPlayerId = myId;
  ssSet('roomId',rid); ssSet('myId',myId); ssSet('myPlayerIndex',0);
  ROOM={...roomData,players:[hostPlayer]};
  
  scheduleBotsJoin(rid);
  renderRoomLobby(); // This will enable the button because we are host
  startPolling(rid, 'room');
  goTo('room');
}

// ════════════════════════ JOIN ROOM ════════════════════════
async function joinRoomById(rid){
  if(!ME.name){goTo('splash');return;}
  const r = await db.get('/rooms/'+rid);
  if(!r){showToast('Room not found');return;}
  if(r.status==='playing'){showToast('Game started');return;}
  const players=toArr(r.players);
  if(players.length>=r.maxPlayers){showToast('Full');return;}

  const existing = players.find(p => p.name === ME.name && !p.isBot);
  if(existing){
    MY_IDX=players.indexOf(existing); myPlayerId = existing.id;
    ssSet('myId',myId); ssSet('roomId',rid); ssSet('myPlayerIndex',MY_IDX);
    ROOM={...r,players};
    renderRoomLobby(); // This will DISABLE the button because we are NOT host
    startPolling(rid, 'room');
    goTo('room');
    return;
  }

  const myId='p-'+Date.now();
  MY_IDX=players.length; myPlayerId = myId;
  const mePlayer={id:myId,name:ME.name,color:ME.color,initial:ME.initial,isHost:false,isBot:false,score:0};
  await db.set('/rooms/'+rid+'/players/'+myId, mePlayer);

  ssSet('myId',myId); ssSet('myPlayerIndex',MY_IDX); ssSet('roomId',rid);
  ROOM={...r, players: [...players, mePlayer]};
  renderRoomLobby(); // This will DISABLE the button
  startPolling(rid, 'room');
  goTo('room');
}

// ════════════════════════ ROOM LOBBY & HOST LOGIC ════════════════════════
function startPolling(rid, type){
  if(pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(async () => {
    if(type === 'room') {
      const r = await db.get('/rooms/'+rid);
      if(!r) { leaveRoomCleanup(); goTo('lobby'); showToast("Room closed"); return; }
      ROOM = {...r, players: toArr(r.players)};
      // Resync my index
      const me = ROOM.players.find(p => p.id === myPlayerId);
      if(me) MY_IDX = ROOM.players.indexOf(me);
      else { leaveRoomCleanup(); goTo('lobby'); return; }
      
      renderRoomLobby(); // Update button states
      if(r.status === 'playing') {
          clearInterval(pollInterval);
          enterGame();
      }
    } else if(type === 'game') {
       await syncGame();
    }
  }, 2000);
}

function scheduleBotsJoin(rid){
  if(!ROOM||ROOM.cpuFill==='none')return;
  setTimeout(async () => {
    const currentData = await db.get('/rooms/'+rid);
    if(!currentData || currentData.status !== 'waiting') return;
    const currentPlayers = toArr(currentData.players);
    const humans = currentPlayers.filter(p=>!p.isBot).length;
    const want = currentData.cpuFill==='all' ? currentData.maxPlayers - humans : Math.max(0, currentData.maxPlayers - Math.ceil(currentData.maxPlayers/2));
    
    let count = 0;
    for(let i=0; i<want; i++) {
       if(currentPlayers.length >= currentData.maxPlayers) break;
       const botId = 'bot-'+Date.now()+i;
       const bot = {id:botId, name:BOTS[i%BOTS.length], color:AVCOLS[(currentPlayers.length+count)%AVCOLS.length], initial:'B', isHost:false, isBot:true, score:0};
       await db.set('/rooms/'+rid+'/players/'+botId, bot);
       count++;
    }
  }, 1000);
}

function renderRoomLobby(){
  if(!ROOM)return;
  document.getElementById('rh-name').textContent=ROOM.name;
  document.getElementById('rh-code').textContent=ROOM.code;
  document.getElementById('rh-players').textContent=ROOM.players.length+'/'+ROOM.maxPlayers;
  document.getElementById('share-link').textContent=location.href.split('?')[0]+'?room='+ROOM.code;
  
  const sg=document.getElementById('slots-grid');
  sg.innerHTML='';
  for(let i=0;i<ROOM.maxPlayers;i++){
    const p=ROOM.players[i];
    const div=document.createElement('div');
    if(p){div.className='slot filled'+(p.isHost?' host-slot':'');div.innerHTML=`<div class="slot-av" style="background:${p.color}">${p.initial}</div><div class="slot-name">${p.name}</div><div class="slot-tag ${p.isHost?'host':''}">${p.isHost?'👑 Host':''}</div>`;}
    else{div.className='slot empty-slot';div.innerHTML='<div style="font-size:24px;color:var(--dim)">+</div>';}
    sg.appendChild(div);
  }
  
  // ════════════════════════ HOST CHECK LOGIC ════════════════════════
  const sb=document.getElementById('start-btn');
  const imHost = ROOM.players[0] && ROOM.players[0].id === myPlayerId;
  const isFull = ROOM.players.length >= 2;
  
  if(sb){
    sb.disabled = !imHost; // Disable if NOT host
    if(!imHost) {
        sb.textContent = "Waiting for Host...";
        sb.style.opacity = "0.5";
    } else {
        sb.textContent = isFull ? "Start Game 🚀" : "Need 2 Players";
        sb.style.opacity = isFull ? "1" : "0.6";
    }
  }
}

function leaveRoomCleanup(){ if(pollInterval) clearInterval(pollInterval); ROOM=null; ssSet('roomId',null); ssSet('myId',null); }
async function leaveRoom(){
  if(!ROOM)return;
  const isHost=ROOM.players[0]&&ROOM.players[0].id===myPlayerId;
  if(isHost){await db.remove('/rooms/'+ROOM.id);}
  else{if(myPlayerId)await db.remove('/rooms/'+ROOM.id+'/players/'+myPlayerId);}
  leaveRoomCleanup(); goTo('lobby'); loadRooms();
}

// ════════════════════════ GAME ENGINE ════════════════════════
function buildDeck(){
  const d=[];
  COLORS.forEach(c=>{d.push({c,v:'0'});for(let i=0;i<2;i++){ACTS.forEach(v=>d.push({c,v}));for(let n=1;n<=9;n++)d.push({c,v:String(n)});}});
  for(let i=0;i<4;i++){d.push({c:'wild',v:'wild'});d.push({c:'wild',v:'wild4'});}
  return d;
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}

async function pushGame(){
  if(!ROOM||!GAME)return;
  const isMyTurn = GAME.currentPlayer === MY_IDX;
  const imHost = ROOM.players[0] && ROOM.players[0].id === myPlayerId;
  if(!isMyTurn && !imHost) return;
  
  const state = {
    deck:GAME.deck, discard:GAME.discard, handCounts:GAME.hands.map(h=>h.length),
    currentPlayer:GAME.currentPlayer, dir:GAME.dir, activeColor:GAME.activeColor, activeValue:GAME.activeValue,
    drawStack:GAME.drawStack, drawType:GAME.drawType, drawnPenalty:GAME.drawnPenalty, drawnThisTurn:GAME.drawnThisTurn,
    pendingWild:GAME.pendingWild, gameOver:GAME.gameOver, unoCalledBy:GAME.unoCalledBy, unoVulnerable:GAME.unoVulnerable,
    scores:GAME.scores, lastWinPts:GAME.lastWinPts||0, seq:(GAME.seq||0)+1
  };
  await db.set('/games/'+ROOM.id+'/state', state);
  await db.set('/games/'+ROOM.id+'/hands/'+MY_IDX, GAME.hands[MY_IDX]);
  if(imHost){ GAME.hands.forEach((h,i)=>{ if(ROOM.players[i]&&ROOM.players[i].isBot) db.set('/games/'+ROOM.id+'/hands/'+i, h); }); }
}

async function syncGame(){
    if(!ROOM||!GAME)return;
    const state = await db.get('/games/'+ROOM.id+'/state');
    if(!state || state.seq < GAME.seq) return;
    const handData = await db.get('/games/'+ROOM.id+'/hands/'+MY_IDX);
    const myHand = handData ? toArr(handData) : [];
    const imHost=ROOM.players[0]&&ROOM.players[0].id===myPlayerId;
    let allHands=[];
    if(imHost){ const hD=await db.get('/games/'+ROOM.id+'/hands')||{}; for(let i=0;i<ROOM.players.length;i++)allHands.push(toArr(hD[i])); }
    else { for(let i=0;i<ROOM.players.length;i++)allHands.push(i===MY_IDX?myHand:[]); }
    GAME={...state, hands:allHands, discard:toArr(state.discard), deck:toArr(state.deck), scores:toArr(state.scores)};
    renderGame();
    if(imHost && !GAME.gameOver){ const cp=ROOM.players[GAME.currentPlayer]; if(cp&&cp.isBot)setTimeout(()=>doCPUTurn(GAME.currentPlayer,state.seq),800); }
    if(!GAME.gameOver){ setGStatus(GAME.currentPlayer===MY_IDX?"Your Turn":(ROOM.players[GAME.currentPlayer].name+"'s turn")); }
    if(GAME.gameOver){ const w=GAME.handCounts.findIndex(c=>c===0); if(w>=0)showWin(w,GAME.lastWinPts); }
}

async function startGame(){
  if(!ROOM||ROOM.players.length<2){showToast('Need 2+ players');return;}
  const imHost=ROOM.players[0]&&ROOM.players[0].id===myPlayerId;
  if(!imHost){showToast("Only host can start"); return;} // Redundant check but safe
  
  const n=ROOM.players.length;
  const deck=shuffle(buildDeck());
  const hands=Array.from({length:n},()=>[]);
  for(let i=0;i<7;i++)hands.forEach((_,p)=>hands[p].push(deck.pop()));
  
  let first; do{first=deck.pop();}while(first.c==='wild'); // No wild start
  
  GAME={
    deck,hands,discard:[first], currentPlayer:0, dir:1, activeColor:first.c, activeValue:first.v,
    drawStack:0,drawType:null,drawnPenalty:false,drawnThisTurn:false,pendingWild:false,gameOver:false,
    unoCalledBy:-1,unoVulnerable:-1, scores:Array(n).fill(0), lastWinPts:0, handCounts:hands.map(h=>h.length), seq:0
  };
  if(first.v==='reverse')GAME.dir=-1; else if(first.v==='skip')GAME.currentPlayer=1; else if(first.v==='draw2'){GAME.drawStack=2;GAME.drawType='draw2';}
  
  await db.set('/rooms/'+ROOM.id+'/status', 'playing');
  await pushGame();
  enterGame();
}

function enterGame(){ goTo('game'); startPolling(ROOM.id, 'game'); }

function drawLocal(who,n){ for(let i=0;i<n;i++){ if(GAME.deck.length===0){ if(GAME.discard.length>1){ const t=GAME.discard.pop(); GAME.deck=shuffle(GAME.discard); GAME.discard=[t];} else break; } if(GAME.deck.length)GAME.hands[who].push(GAME.deck.pop()); } GAME.handCounts=GAME.hands.map(h=>h.length); }

function canPlay(card){
  if(GAME.drawStack>0 && !GAME.drawnPenalty){ return (GAME.drawType==='draw2' && card.v==='draw2') || (GAME.drawType==='wild4' && card.v==='wild4'); }
  if(card.c==='wild' && card.v==='wild4'){ if(ROOM.rules&&ROOM.rules.noMercy)return true; const h=GAME.hands[MY_IDX]; return !h.some(c=>c.c!=='wild' && (c.c===GAME.activeColor||c.v===GAME.activeValue)); }
  if(card.c==='wild')return true; return card.c===GAME.activeColor||card.v===GAME.activeValue;
}
function canPlayAfterPenalty(card){ return card.c===GAME.activeColor; }

async function playCard(idx){
  if(!GAME||GAME.gameOver||GAME.currentPlayer!==MY_IDX)return;
  const card=GAME.hands[MY_IDX][idx]; if(!card)return;
  const ok=GAME.drawnPenalty?canPlayAfterPenalty(card):canPlay(card);
  if(!ok){showToast("Invalid move");return;}
  if(GAME.hands[MY_IDX].length===2)GAME.unoVulnerable=MY_IDX;
  GAME.hands[MY_IDX].splice(idx,1); GAME.discard.push(card); GAME.activeValue=card.v;
  if(card.c!=='wild')GAME.activeColor=card.c;
  GAME.drawnThisTurn=false; GAME.drawStack=0; GAME.drawType=null; GAME.drawnPenalty=false;
  document.getElementById('end-btn').classList.remove('show');
  if(checkWin(MY_IDX))return;
  if(card.c==='wild'){GAME.pendingWild=true;renderGame();openColorModal();return;}
  applyEffect(card,MY_IDX); advance(); await pushGame();
}
function applyEffect(card,who){
  const n=ROOM.players.length, next=(who+GAME.dir+n)%n;
  if(card.v==='skip')advance(); else if(card.v==='reverse'){if(n===2)advance();else GAME.dir*=-1;}
  else if(card.v==='draw2'){GAME.drawStack+=2;GAME.drawType='draw2';} else if(card.v==='wild4'){GAME.drawStack+=4;GAME.drawType='wild4';}
}
function advance(){GAME.currentPlayer=(GAME.currentPlayer+GAME.dir+ROOM.players.length)%ROOM.players.length;}
function checkWin(who){ if(GAME.hands[who].length===0){ GAME.gameOver=true; let pts=0; GAME.hands.forEach((h,i)=>{if(i!==who)h.forEach(c=>pts+=cardPts(c));}); GAME.scores[who]=(GAME.scores[who]||0)+pts; GAME.lastWinPts=pts; pushGame(); return true; } return false; }
function showWin(who,pts){ const p=ROOM.players[who]; document.getElementById('win-emoji').textContent=who===MY_IDX?'🎉':'😢'; document.getElementById('win-title').textContent=who===MY_IDX?'YOU WIN!':(p.name+' WINS!'); document.getElementById('win-pts').textContent='+'+pts; document.getElementById('win-screen').classList.add('show'); }

async function onDraw(){
  if(!GAME||GAME.gameOver||GAME.currentPlayer!==MY_IDX||GAME.drawnThisTurn||GAME.pendingWild)return;
  if(GAME.drawStack>0&&!GAME.drawnPenalty){
    drawLocal(MY_IDX,GAME.drawStack); GAME.drawnPenalty=true; GAME.drawnThisTurn=true;
    const hasMatch=GAME.hands[MY_IDX].some(c=>canPlayAfterPenalty(c));
    if(hasMatch){setGStatus('Play matching color or end');document.getElementById('end-btn').classList.add('show');}
    else{setGStatus('No match. Turn passed');GAME.drawStack=0;GAME.drawType=null;GAME.drawnPenalty=false;GAME.drawnThisTurn=false;advance();}
    await pushGame();return;
  }
  drawLocal(MY_IDX,1);GAME.drawnThisTurn=true; const drew=GAME.hands[MY_IDX][GAME.hands[MY_IDX].length-1];
  if(canPlay(drew)){setGStatus('Play or end turn');document.getElementById('end-btn').classList.add('show');}
  else{setGStatus('No match. Passed');GAME.drawnThisTurn=false;advance();}
  await pushGame();
}
async function endTurn(){ if(!GAME||GAME.currentPlayer!==MY_IDX)return; GAME.drawnThisTurn=false;GAME.drawStack=0;GAME.drawType=null;GAME.drawnPenalty=false; document.getElementById('end-btn').classList.remove('show'); advance(); await pushGame(); }
async function callUno(){ if(!GAME||GAME.gameOver)return; if(GAME.unoVulnerable>=0&&GAME.unoVulnerable!==MY_IDX&&GAME.unoCalledBy!==GAME.unoVulnerable){ drawLocal(GAME.unoVulnerable,2); showShout('CAUGHT!'); GAME.unoVulnerable=-1; await pushGame(); return; } if(GAME.hands[MY_IDX].length===1){ GAME.unoCalledBy=MY_IDX;GAME.unoVulnerable=-1; showShout('UNO!'); await pushGame(); } }
function openColorModal(){document.getElementById('overlay').style.display='block';document.getElementById('color-modal').style.display='block';}
async function pickColor(col){ closeModals(); GAME.activeColor=col;GAME.pendingWild=false; applyEffect(GAME.discard[GAME.discard.length-1],MY_IDX); advance(); await pushGame(); }

// CPU
function cpuBestColor(who){const cnt={red:0,blue:0,green:0,yellow:0};GAME.hands[who].forEach(c=>{if(c.c!=='wild')cnt[c.c]++;});return COLORS.reduce((a,b)=>cnt[a]>=cnt[b]?a:b);}
async function doCPUTurn(who, seq){ if(!GAME||GAME.seq!==seq||GAME.currentPlayer!==who)return; const p=ROOM.players[who]; if(!p||!p.isBot)return;
  if(GAME.drawStack>0&&!GAME.drawnPenalty){ const ct=GAME.drawType; const counter=GAME.hands[who].map((c,i)=>({c,i})).filter(({c})=>c.v===ct); if(counter.length){await cpuPlay(who,counter[0].i,seq);return;} drawLocal(who,GAME.drawStack);GAME.drawnPenalty=true; const match=GAME.hands[who].map((c,i)=>({c,i})).filter(({c})=>canPlayAfterPenalty(c)); if(match.length){match.sort((a,b)=>(b.c.v==='wild4'?10:0)-(a.c.v==='wild4'?10:0));await cpuPlay(who,match[0].i,seq);}else{GAME.drawStack=0;GAME.drawType=null;GAME.drawnPenalty=false;advance();await pushGame();} return; }
  const playable=GAME.hands[who].map((c,i)=>({c,i})).filter(({c})=>canPlay(c)); if(!playable.length){drawLocal(who,1);const d=GAME.hands[who][GAME.hands[who].length-1];if(canPlay(d))await cpuPlay(who,GAME.hands[who].length-1,seq);else{advance();await pushGame();}return;}
  playable.sort((a,b)=>(b.c.v==='wild4'?10:0)-(a.c.v==='wild4'?10:0)); await cpuPlay(who,playable[0].i,seq);
}
async function cpuPlay(who,idx,seq){ if(!GAME||GAME.seq!==seq)return; const card=GAME.hands[who][idx]; GAME.hands[who].splice(idx,1);GAME.discard.push(card);GAME.activeValue=card.v;if(card.c!=='wild')GAME.activeColor=card.c;GAME.drawStack=0;GAME.drawType=null;GAME.drawnPenalty=false;GAME.handCounts=GAME.hands.map(h=>h.length);
  if(GAME.hands[who].length===1){GAME.unoCalledBy=who;GAME.unoVulnerable=-1;showShout('UNO!');} if(checkWin(who))return;
  if(card.c==='wild'){GAME.activeColor=cpuBestColor(who);applyEffect(card,who);advance();await pushGame();return;} applyEffect(card,who);advance();await pushGame();
}

// RECOVERY
async function playAgain(){ document.getElementById('win-screen').classList.remove('show'); await db.remove('/games/'+ROOM.id); startGame(); }
async function backToLobby(){ document.getElementById('win-screen').classList.remove('show'); await db.remove('/games/'+ROOM.id); await db.remove('/rooms/'+ROOM.id); GAME=null;leaveRoomCleanup(); goTo('lobby'); loadRooms(); }
async function leaveGame(){ await db.remove('/games/'+ROOM.id); await db.remove('/rooms/'+ROOM.id); GAME=null;leaveRoomCleanup(); goTo('lobby'); loadRooms(); }

// RENDER
function renderGame(){ if(!GAME||!ROOM)return; renderOpps();renderMyHand();renderCenter();renderScores(); document.getElementById('uno-btn').classList.toggle('faded',!(GAME.hands[MY_IDX].length===1||(GAME.unoVulnerable>=0&&GAME.unoVulnerable!==MY_IDX))); }
function renderOpps(){ const el=document.getElementById('opps-el');el.innerHTML='';const others=ROOM.players.map((_,i)=>i).filter(i=>i!==MY_IDX);if(!others.length)return;const g=document.createElement('div');g.style.cssText='display:grid;grid-template-columns:repeat('+Math.min(others.length,3)+',1fr);gap:8px;margin-bottom:8px;';others.forEach(i=>{const p=ROOM.players[i],cnt=GAME.handCounts[i],act=GAME.currentPlayer===i;const d=document.createElement('div');d.className='opp-zone'+(act?' active-turn':'');let b='';for(let j=0;j<Math.min(cnt,10);j++)b+='<div class="card-back">UNO</div>';d.innerHTML='<div class="opp-meta"><div class="opp-av" style="background:'+p.color+'">'+p.initial+'</div><div class="opp-nm">'+p.name+'</div><div class="opp-cnt">'+cnt+'</div></div><div class="opp-cards">'+b+'</div>';g.appendChild(d);});el.appendChild(g); }
function renderMyHand(){ const el=document.getElementById('p-hand');el.innerHTML='';const h=GAME.hands[MY_IDX]||[];const myTurn=GAME.currentPlayer===MY_IDX&&!GAME.gameOver&&!GAME.pendingWild;h.forEach((card,i)=>{const p=myTurn?(GAME.drawnPenalty?canPlayAfterPenalty(card):canPlay(card)):false;const d=document.createElement('div');d.className='card '+cardCls(card)+(p?'':' no-play');const l=cardLbl(card);d.innerHTML='<span class="cc tl">'+l+'</span><span class="cv">'+l+'</span><span class="cc br">'+l+'</span>';if(p)d.onclick=()=>playCard(i);el.appendChild(d);});document.getElementById('p-cnt').textContent=h.length+' cards'; }
function renderCenter(){ const t=GAME.discard[GAME.discard.length-1],l=cardLbl(t),dc=document.getElementById('discard-top');dc.innerHTML='<span class="dc-corner tl">'+l+'</span><span style="font-family:\'Bebas Neue\';font-size:26px;">'+l+'</span><span class="dc-corner br">'+l+'</span>';dc.style.background=t.c==='wild'?CGRAD[GAME.activeColor]:CGRAD[t.c];dc.style.color=t.c==='yellow'||(t.c==='wild'&&GAME.activeColor==='yellow')?'rgba(40,28,0,.9)':'#fff'; document.getElementById('color-dot').style.background=CHEX[GAME.activeColor];document.getElementById('dir-icon').textContent=GAME.dir===1?'↻':'↺';document.getElementById('turn-txt').textContent=GAME.currentPlayer===MY_IDX?'Your Turn':ROOM.players[GAME.currentPlayer].name; const dp=document.getElementById('draw-pile');dp.classList.toggle('no-draw',!(GAME.currentPlayer===MY_IDX && !GAME.gameOver && !GAME.drawnThisTurn && !GAME.pendingWild)); if(GAME.drawStack>0&&GAME.currentPlayer===MY_IDX&&!GAME.drawnPenalty){dp.textContent='Draw '+GAME.drawStack;dp.style.color='var(--gold)';}else{dp.textContent='UNO';dp.style.color='';} }
function renderScores(){ const el=document.getElementById('scores-row');el.innerHTML='';ROOM.players.forEach((p,i)=>{const d=document.createElement('div');d.className='sp'+(GAME.currentPlayer===i?' active':'');d.innerHTML='<span>'+(i===MY_IDX?'You':p.name)+'</span><span style="color:var(--gold);margin-left:4px;">'+(GAME.scores[i]||0)+'</span>';el.appendChild(d);}); }

// SESSION RESTORE
async function restoreSession(){
  const name=ssGet('name'),color=ssGet('color'),initial=ssGet('initial'),roomId=ssGet('roomId'),savedMyId=ssGet('myId');
  if(!name){goTo('splash');return;} ME.name=name;ME.color=color||AVCOLS[0];ME.initial=initial||name[0].toUpperCase(); myPlayerId=savedMyId; document.getElementById('nav-av').style.background=ME.color;document.getElementById('nav-av').textContent=ME.initial;document.getElementById('nav-name').textContent=ME.name;
  if(!roomId){loadRooms();goTo('lobby');return;}
  const r=await db.get('/rooms/'+roomId); if(!r){ssSet('roomId',null);loadRooms();goTo('lobby');return;} ROOM={...r,players:toArr(r.players)}; const me=ROOM.players.find(p=>p.id===savedMyId); if(!me){ssSet('roomId',null);loadRooms();goTo('lobby');return;} MY_IDX=ROOM.players.indexOf(me);
  if(r.status==='playing'){ const s=await db.get('/games/'+roomId+'/state'); if(s){GAME={...s,hands:[],discard:toArr(s.discard),deck:toArr(s.deck)};enterGame();}else{goTo('lobby');} }else{renderRoomLobby();startPolling(roomId,'room');goTo('room');}
}
document.getElementById('name-inp').addEventListener('keydown',e=>{if(e.key==='Enter')goToLobby();});
const urlRoom=new URLSearchParams(location.search).get('room');if(urlRoom){window.addEventListener('load',()=>{setTimeout(()=>{if(document.getElementById('lobby').classList.contains('active')){document.getElementById('join-inp').value=urlRoom;showJoinModal();}},400);});}
restoreSession();
</script>
